<!DOCTYPE html>
<html lang="zh-HK"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache">
<title>巴士到站</title>
<style>
  html,body{margin:0;padding:0;min-height:100%;color:#4a3f55;
    font-family:"Segoe UI","Microsoft YaHei","Yu Gothic",sans-serif;
    background:
      radial-gradient(circle at 12% 18%, #fff4ae66 0 55px, transparent 56px),
      radial-gradient(circle at 88% 14%, #ffb6d955 0 48px, transparent 50px),
      radial-gradient(circle at 78% 82%, #cbb8ff44 0 70px, transparent 72px),
      radial-gradient(circle at 16% 86%, #9cf0c844 0 60px, transparent 62px),
      linear-gradient(165deg, #f7fbff 0%, #fff7fb 45%, #f3fff8 100%);
  }
  .scene{position:relative;min-height:100vh;overflow:hidden;}
  .bg-mascot{
    position:fixed; right:-4%; bottom:-6%;
    width:min(58vw, 460px); height:auto;
    opacity:0.18; pointer-events:none; z-index:0;
  }
  .bg-mascot-2{
    position:fixed; left:-8%; top:28%;
    width:min(34vw, 260px); height:auto;
    opacity:0.10; pointer-events:none; z-index:0;
    transform:scaleX(-1) rotate(-8deg);
  }
  .wrap{position:relative;z-index:1;padding:10px 12px 12px;max-width:980px;margin:0 auto;}
  .hero{
    display:flex;align-items:center;gap:12px;position:relative;
    background:linear-gradient(135deg, rgba(255,249,252,.92), rgba(255,232,242,.88) 55%, rgba(255,244,214,.9));
    border:3px solid #ffb3cf;border-radius:22px;padding:8px 86px 8px 12px;
    box-shadow:0 6px 0 #f5a3c4, 0 12px 24px rgba(90,60,90,.08);
    margin-bottom:10px;
  }
  .avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;
    border:3px solid #fff;box-shadow:0 0 0 3px #ffb3cf,0 4px 0 #f0a0c0;background:#6f8f8d;}
  .letsgo-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);
    width:64px;height:64px;border-radius:50%;object-fit:cover;
    border:3px solid #fff;box-shadow:0 0 0 3px #ffb3cf,0 4px 0 #f0a0c0;background:#fff;}
  h1{margin:0;font-size:22px;font-weight:800;color:#d4497d;
    text-shadow:1px 1px 0 #fff,2px 2px 0 #ffd0e2;}
  .list{
    background:rgba(255,253,249,.9);border:3px solid #ffc2d9;border-radius:18px;
    box-shadow:0 6px 0 #f0b4cc;padding:4px 6px;overflow:hidden;
  }
  .row{
    display:flex;align-items:center;gap:14px;padding:9px 10px;
    border-bottom:1px dashed #f0cfe0;border-radius:10px;
    font-size:22px;font-weight:800;line-height:1.15;
  }
  .row:last-child{border-bottom:none;}
  .row:nth-child(odd){background:rgba(255,247,251,.92);}
  .row:nth-child(even){background:rgba(247,255,249,.92);}
  .route{flex:0 0 4.2em;color:#6b4f8a;}
  .dest{flex:0 0 5.5em;color:#4a3f55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .eta{flex:1 1 auto;color:#2f9e6b;letter-spacing:1px;white-space:nowrap;}
  .foot{margin-top:10px;border:3px solid #ffc2d9;border-radius:16px;padding:8px 12px;
    background:linear-gradient(90deg, rgba(255,249,252,.94), rgba(247,255,249,.94));
    display:flex;justify-content:space-between;gap:10px;font-size:13px;
    box-shadow:0 5px 0 #f0b4cc;}
  .clock{font-size:20px;font-weight:800;color:#d4497d;white-space:nowrap;}
  @media (max-width:700px){
    .row{font-size:18px;gap:10px;padding:8px;}
    .route{flex-basis:3.6em;}
    .dest{flex-basis:4.5em;}
  }
</style>
</head><body>
<div class="scene">
  <img class="bg-mascot" src="./images/lets_go.png" alt="">
  <img class="bg-mascot-2" src="./images/lets_go.png" alt="">
  <div class="wrap">
    <div class="hero">
      <img class="avatar" src="./images/usagyuun.png" alt="usagyuun">
      <h1>✧ 巴士 / 小巴到站 ✦</h1>
      <img class="letsgo-badge" src="./images/lets_go_badge.png" alt="lets go">
    </div>
    <div class="list">
      <div class='row'><span class='route'>251A</span><span class='dest'>上村</span><span class='eta'>09:04　　09:24　　09:44</span></div><div class='row'><span class='route'>64K</span><span class='dest'>大埔墟站</span><span class='eta'>08:54　　08:54　　09:04</span></div><div class='row'><span class='route'>64K</span><span class='dest'>元朗(西)</span><span class='eta'>08:59　　09:05　　09:17</span></div><div class='row'><span class='route'>71</span><span class='dest'>河背</span><span class='eta'>09:04　　09:18　　09:33</span></div><div class='row'><span class='route'>71</span><span class='dest'>元朗</span><span class='eta'>09:03　　09:10　　09:25</span></div><div class='row'><span class='route'>71A</span><span class='dest'>長莆</span><span class='eta'>08:58　　09:23　　09:43</span></div><div class='row'><span class='route'>71A</span><span class='dest'>錦上路站</span><span class='eta'>09:16　　09:46</span></div>
    </div>
    <div class="foot">
      <div>石崗現況 30°C 元朗公園 · 濕度 79% · 石崗2小時內有機會落雨 · 大致天晴，但局部地區有驟雨。日間酷熱，市區最高氣溫約34度，新界再高一兩度。吹輕微至和緩西至西南風。</div>
      <div class="clock">08:54</div>
    </div>
  </div>
</div>
</body></html>

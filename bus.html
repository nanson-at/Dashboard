<!DOCTYPE html>

<title>巴士到站</title>
<style>
  html,body{margin:0;padding:0;background:#fff;color:#4a3f55;
    font-family:"Segoe UI","Microsoft YaHei","Yu Gothic",sans-serif;}
  .wrap{padding:14px;min-height:100vh;background:#fff;}
  .hero{display:flex;align-items:center;gap:12px;
    background:linear-gradient(135deg,#fff9fc,#ffe8f2 60%,#fff4d6);

    box-shadow:0 7px 0 #f5a3c4;margin-bottom:12px;}
  .avatar{width:78px;height:78px;border-radius:50%;object-fit:cover;
    border:3px solid #fff;box-shadow:0 0 0 3px #ffb3cf,0 5px 0 #f0a0c0;background:#6f8f8d;}
  h1{margin:0;font-size:24px;font-weight:800;color:#d4497d;
    text-shadow:1px 1px 0 #fff,2px 2px 0 #ffd0e2;}
  table{width:100%;border-collapse:collapse;background:#fffdf9;

  th,td{padding:11px 8px;text-align:left;font-size:16px;border-bottom:1px dashed #f0cfe0;}

  tr:nth-child(odd) td{background:#fff7fb;}
  tr:nth-child(even) td{background:#f7fff9;}
  .type{width:12%;color:#888;font-size:12px;}
  .route{width:14%;font-weight:800;font-size:20px;color:#6b4f8a;}

  .eta{width:46%;font-weight:800;font-size:22px;letter-spacing:1px;color:#2f9e6b;}

</head><body>
<div class="wrap">

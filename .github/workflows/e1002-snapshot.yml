name: E1002 Snapshot

# DISABLED - kept for later re-enable
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Set true only to run manually while disabled gate is on"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: e1002-snapshot
  cancel-in-progress: true

jobs:
  build:
    if: false  # fully stopped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps + CJK font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          pip install requests pillow
      - name: Build
        run: python scripts/build_e1002.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e1002.html e1002.png
          if git diff --staged --quiet; then echo "No changes"; exit 0; fi
          git commit -m "chore(e1002): auto snapshot $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push

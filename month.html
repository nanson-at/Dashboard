<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>Usagyuun 當月活動</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #ffffff;
      color: #4a3f55;
      font-family: "Segoe UI", "Microsoft YaHei", "Yu Gothic", "Noto Sans TC", sans-serif;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 16px 14px 28px;
      min-height: 100vh;
      background: #ffffff;
    }
    .hero {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #fff9fc, #ffe8f2 60%, #fff4d6);
      border: 3px solid #ffb3cf;
      border-radius: 24px;
      padding: 12px 14px;
      box-shadow: 0 8px 0 #f5a3c4, 0 12px 24px rgba(90, 60, 90, 0.10);
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "✦ ✧ ✦";
      position: absolute;
      right: 14px;
      top: 8px;
      color: #ffd36b;
      font-size: 14px;
      letter-spacing: 4px;
    }
    .avatar {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: #6f8f8d;
      border: 3px solid #fff;
      box-shadow: 0 0 0 3px #ffb3cf, 0 6px 0 #f0a0c0;
      object-fit: cover;
      flex: 0 0 auto;
    }
    .hero-text { flex: 1; min-width: 0; }
    h1 {
      margin: 0 0 4px;
      font-size: 26px;
      font-weight: 800;
      color: #d4497d;
      letter-spacing: 0.5px;
      text-shadow: 1px 1px 0 #fff, 2px 2px 0 #ffd0e2;
    }
    .subtitle {
      margin: 0;
      font-size: 14px;
      color: #7a6688;
    }
    .table-card {
      background: #fffdf9;
      border: 3px solid #ffc2d9;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 0 #f0b4cc, 0 14px 24px rgba(80,50,80,0.08);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    thead th {
      background: linear-gradient(180deg, #ff9ec4, #ff7eb0);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      text-align: left;
      padding: 12px 10px;
      border-bottom: 3px solid #f06a9f;
    }
    tbody td {
      padding: 12px 10px;
      font-size: 15px;
      border-bottom: 1px dashed #f0cfe0;
      vertical-align: middle;
      word-wrap: break-word;
    }
    tbody tr:nth-child(4n+1) { background: #fff7fb; }
    tbody tr:nth-child(4n+2) { background: #f7fff9; }
    tbody tr:nth-child(4n+3) { background: #fffced; }
    tbody tr:nth-child(4n+4) { background: #f7f3ff; }
    tbody tr.today {
      background: linear-gradient(90deg, #fff2a8, #ffe0f0) !important;
      box-shadow: inset 5px 0 0 #ff8fb7;
    }
    .col-date { width: 28%; font-weight: 800; color: #6b4f8a; }
    .col-time { width: 15%; font-weight: 800; color: #2f9e6b; }
    .col-title { width: 37%; color: #4a3f55; font-weight: 650; }
    .col-person { width: 20%; color: #d4497d; font-weight: 700; }
    .badge-today {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffd76a, #ffb703);
      color: #7a4b00;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid #f0b429;
    }
    .empty, .err {
      margin-top: 8px;
      padding: 30px 16px;
      text-align: center;
      font-size: 17px;
      border-radius: 22px;
      border: 3px dashed #ffb3cf;
      background: #fff9fc;
    }
    .err { border-color: #ff8e8e; background: #fff5f5; }
    .sparkle { display: inline-block; }
    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      .avatar { width: 76px; height: 76px; }
      thead th, tbody td { font-size: 13px; padding: 10px 7px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <img class="avatar" src="./images/usagyuun.png" alt="Usagyuun" />
      <div class="hero-text">
        <h1><span class="sparkle">✧</span> 當月活動 <span class="sparkle">✦</span></h1>
        <p class="subtitle" id="range"></p>
      </div>
    </div>
    <div id="list"></div>
  </div>

  <script>
    function pad(n) { return String(n).padStart(2, '0'); }

    function parseParams() {
      const p = new URLSearchParams(location.search);
      const now = new Date();
      let year = now.getFullYear();
      let month = now.getMonth() + 1;
      if (p.get('ym')) {
        const m = p.get('ym').match(/^(\d{4})-(\d{1,2})$/);
        if (m) { year = +m[1]; month = +m[2]; }
      } else {
        if (p.get('year')) year = +p.get('year');
        if (p.get('month')) month = +p.get('month');
        const offset = p.has('offset') ? +p.get('offset') : 0;
        if (!isNaN(offset) && offset !== 0) {
          const d = new Date(year, month - 1 + offset, 1);
          year = d.getFullYear();
          month = d.getMonth() + 1;
        }
      }
      if (month < 1 || month > 12 || isNaN(year)) {
        year = now.getFullYear();
        month = now.getMonth() + 1;
      }
      return {
        year, month,
        person: (p.get('person') || p.get('who') || '').trim(),
        src: p.get('src') || './data/events.json'
      };
    }

    function monthRange(year, month) {
      const start = year + '-' + pad(month) + '-01';
      const last = new Date(year, month, 0).getDate();
      const end = year + '-' + pad(month) + '-' + pad(last);
      return { start: start, end: end };
    }

    function weekdayZh(dateStr) {
      const parts = dateStr.split('-').map(Number);
      const w = new Date(parts[0], parts[1] - 1, parts[2]).getDay();
      return ['日','一','二','三','四','五','六'][w];
    }

    function todayStr() {
      const n = new Date();
      return n.getFullYear() + '-' + pad(n.getMonth()+1) + '-' + pad(n.getDate());
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function main() {
      const cfg = parseParams();
      const range = monthRange(cfg.year, cfg.month);
      document.getElementById('range').textContent = cfg.year + '年' + cfg.month + '月  ·  ' + range.start + ' → ' + range.end;
      const list = document.getElementById('list');

      try {
        const res = await fetch(cfg.src + (cfg.src.indexOf('?') >= 0 ? '&' : '?') + 't=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        let events = Array.isArray(data) ? data : (data.events || data.data || []);
        events = events.filter(function(ev) {
          const d = String(ev.date || '').slice(0, 10);
          if (d < range.start || d > range.end) return false;
          if (cfg.person) {
            const who = String(ev.person || ev.people || ev.who || '');
            if (who.indexOf(cfg.person) < 0) return false;
          }
          return true;
        });
        events.sort(function(a, b) {
          return (String(a.date||'') + ' ' + String(a.time||'')).localeCompare(String(b.date||'') + ' ' + String(b.time||''));
        });

        if (!events.length) {
          list.innerHTML = '<div class="empty">這個月暫時沒有活動</div>';
          return;
        }

        const today = todayStr();
        const rows = events.map(function(ev) {
          const d = String(ev.date || '').slice(0, 10);
          const isToday = d === today;
          const dateLabel = d.slice(5) + '（' + weekdayZh(d) + '）' + (isToday ? '<span class="badge-today">TODAY</span>' : '');
          return '<tr class="' + (isToday ? 'today' : '') + '">' +
            '<td class="col-date">' + dateLabel + '</td>' +
            '<td class="col-time">' + escapeHtml(ev.time || '—') + '</td>' +
            '<td class="col-title">' + escapeHtml(ev.title || ev.name || '') + '</td>' +
            '<td class="col-person">' + escapeHtml(ev.person || ev.people || ev.who || '') + '</td>' +
          '</tr>';
        }).join('');

        list.innerHTML =
          '<div class="table-card"><table><thead><tr>' +
          '<th class="col-date">日期</th><th class="col-time">時間</th><th class="col-title">活動</th><th class="col-person">人物</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table></div>';
      } catch (e) {
        list.innerHTML = '<div class="err">載入失敗：' + escapeHtml(String(e.message || e)) + '</div>';
      }
    }

    main();
  </script>
</body>
</html>

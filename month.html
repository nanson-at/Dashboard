<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>當月活動</title>
  <style>
    :root {
      --bg: #f3f7ff;
      --card: #ffffff;
      --ink: #10243e;
      --muted: #4a6078;
      --line: #b7c7db;
      --today: #fff3bf;
      --today-border: #e6a817;
      --head: #1e5eff;
      --row-a: #eef5ff;
      --row-b: #ffffff;
      --time: #0b6b3a;
      --accent: #d9480f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; min-height: 100%;
      background: linear-gradient(180deg, #dcecff 0%, var(--bg) 40%, #f8fbff 100%);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", "Noto Sans TC", sans-serif;
    }
    .wrap {
      padding: 16px 16px 24px;
      max-width: 920px;
      margin: 0 auto;
      min-height: 100vh;
    }
    .head {
      background: linear-gradient(135deg, #1e5eff, #3b82f6 55%, #60a5fa);
      color: #fff;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 14px;
      box-shadow: 0 6px 18px rgba(30, 94, 255, 0.25);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 28px;
      letter-spacing: 1px;
      font-weight: 800;
    }
    .sub { font-size: 14px; opacity: 0.95; }
    .meta {
      margin: 0 0 12px;
      font-size: 13px;
      color: var(--muted);
      padding: 0 4px;
    }
    .table-wrap {
      background: var(--card);
      border: 2px solid #7aa2ff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(16, 36, 62, 0.08);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    thead th {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color: #fff;
      font-size: 15px;
      text-align: left;
      padding: 12px 10px;
      border-bottom: 2px solid #163d9c;
    }
    tbody td {
      padding: 11px 10px;
      font-size: 16px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      word-wrap: break-word;
    }
    tbody tr:nth-child(odd) { background: var(--row-a); }
    tbody tr:nth-child(even) { background: var(--row-b); }
    tbody tr.today {
      background: var(--today) !important;
      box-shadow: inset 4px 0 0 var(--today-border);
    }
    tbody tr.today td { font-weight: 600; }
    .col-date { width: 28%; color: #1e3a5f; font-weight: 700; }
    .col-time { width: 16%; color: var(--time); font-weight: 800; }
    .col-title { width: 36%; }
    .col-person { width: 20%; color: var(--accent); font-weight: 600; }
    .badge-today {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 999px;
      background: #e6a817;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      vertical-align: middle;
    }
    .empty, .err {
      margin-top: 8px;
      padding: 28px 16px;
      text-align: center;
      font-size: 18px;
      border-radius: 14px;
      border: 2px dashed #7aa2ff;
      background: #fff;
      color: var(--ink);
    }
    .err { border-color: #e03131; background: #fff5f5; }
    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      thead th, tbody td { font-size: 14px; padding: 9px 7px; }
      .col-date { width: 30%; }
      .col-time { width: 18%; }
      .col-title { width: 32%; }
      .col-person { width: 20%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1 id="title">當月活動</h1>
      <div class="sub" id="range"></div>
    </div>
    <div class="meta" id="meta">載入中…</div>
    <div id="list"></div>
  </div>

  <script>
    // Params:
    //   ?ym=2026-07
    //   ?year=2026&month=7
    //   ?offset=0
    //   ?person=Anson
    //   ?src=./data/events.json
    // Device:
    //   https://nanson-at.github.io/Dashboard/month.html
    //   https://nanson-at.github.io/Dashboard/month.html?ym=2026-07

    function pad(n) { return String(n).padStart(2, '0'); }

    function parseParams() {
      const p = new URLSearchParams(location.search);
      const now = new Date();
      let year = now.getFullYear();
      let month = now.getMonth() + 1;

      if (p.get('ym')) {
        const m = p.get('ym').match(/^(\d{4})-(\d{1,2})$/);
        if (m) { year = +m[1]; month = +m[2]; }
      } else {
        if (p.get('year')) year = +p.get('year');
        if (p.get('month')) month = +p.get('month');
        const offset = p.has('offset') ? +p.get('offset') : 0;
        if (!isNaN(offset) && offset !== 0) {
          const d = new Date(year, month - 1 + offset, 1);
          year = d.getFullYear();
          month = d.getMonth() + 1;
        }
      }
      if (month < 1 || month > 12 || isNaN(year)) {
        year = now.getFullYear();
        month = now.getMonth() + 1;
      }
      return {
        year, month,
        person: (p.get('person') || p.get('who') || '').trim(),
        src: p.get('src') || './data/events.json'
      };
    }

    function monthRange(year, month) {
      const start = `${year}-${pad(month)}-01`;
      const last = new Date(year, month, 0).getDate();
      const end = `${year}-${pad(month)}-${pad(last)}`;
      return { start, end };
    }

    function weekdayZh(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const w = new Date(y, m - 1, d).getDay();
      return ['日','一','二','三','四','五','六'][w];
    }

    function todayStr() {
      const n = new Date();
      return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function main() {
      const cfg = parseParams();
      const { start, end } = monthRange(cfg.year, cfg.month);
      document.getElementById('title').textContent = `${cfg.year}年${cfg.month}月 活動`;
      document.getElementById('range').textContent = `${start}  →  ${end}`;

      const list = document.getElementById('list');
      const meta = document.getElementById('meta');

      try {
        const res = await fetch(cfg.src + (cfg.src.includes('?') ? '&' : '?') + 't=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        let events = Array.isArray(data) ? data : (data.events || data.data || []);
        events = events.filter(ev => {
          const d = String(ev.date || '').slice(0, 10);
          if (d < start || d > end) return false;
          if (cfg.person) {
            const who = String(ev.person || ev.people || ev.who || '');
            if (!who.includes(cfg.person)) return false;
          }
          return true;
        });
        events.sort((a, b) => {
          const ka = `${a.date || ''} ${a.time || ''}`;
          const kb = `${b.date || ''} ${b.time || ''}`;
          return ka.localeCompare(kb);
        });

        meta.textContent = `共 ${events.length} 項` +
          (cfg.person ? ` · 篩選：${cfg.person}` : '') +
          ` · ${new Date().toLocaleString('zh-HK')}`;

        if (!events.length) {
          list.innerHTML = `<div class="empty">呢個月暫時冇活動</div>`;
          return;
        }

        const today = todayStr();
        const rows = events.map(ev => {
          const d = String(ev.date || '').slice(0, 10);
          const isToday = d === today;
          const dateLabel = `${d}（${weekdayZh(d)}）` + (isToday ? `<span class="badge-today">今日</span>` : '');
          const time = escapeHtml(ev.time || '—');
          const title = escapeHtml(ev.title || ev.name || '');
          const person = escapeHtml(ev.person || ev.people || ev.who || '');
          return `<tr class="${isToday ? 'today' : ''}">
            <td class="col-date">${dateLabel}</td>
            <td class="col-time">${time}</td>
            <td class="col-title">${title}</td>
            <td class="col-person">${person}</td>
          </tr>`;
        }).join('');

        list.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="col-date">日期</th>
                  <th class="col-time">時間</th>
                  <th class="col-title">活動</th>
                  <th class="col-person">人物</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      } catch (e) {
        meta.textContent = '';
        list.innerHTML = `<div class="err">無法載入活動：${escapeHtml(String(e.message || e))}</div>`;
      }
    }

    main();
  </script>
</body>
</html>

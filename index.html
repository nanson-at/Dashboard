<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九巴與天氣資訊看板 (10秒更新版)</title>
    <style>
        /* 模擬電子墨水屏 (E-ink) 的基本設定 */
        :root {
            --bg-color: #e8e8e8;
            --panel-bg: #f4f4f4;
            --text-color: #2b2b2b;
            --light-text: #555;
            --border-color: #b0b0b0;
            --badge-bg: #cccccc;
            --footer-bg: #d0d0d0;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang HK", "Microsoft JhengHei", sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 主機殼邊框設計 */
        .device-frame {
            background-color: var(--panel-bg);
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
            width: 900px;
            height: 540px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 頂部雙線裝飾 */
        .device-frame::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid var(--border-color);
            pointer-events: none;
            z-index: 10;
        }

        /* 內容區塊 */
        .content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        /* 左右面板共用設定 */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel-divider {
            width: 2px;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 4px,
                var(--border-color) 4px,
                var(--border-color) 8px
            );
        }

        /* 左側：巴士資訊 */
        .bus-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .bus-row {
            display: flex;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .bus-row:last-child {
            border-bottom: none;
        }

        .bus-route {
            background-color: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            width: 75px;
            text-align: center;
            margin-right: 15px;
        }

        .bus-etas {
            display: flex;
            flex: 1;
            justify-content: space-between;
        }

        .eta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
        }

        .eta-time {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .eta-remark {
            font-size: 12px;
            color: var(--light-text);
            margin-top: 2px;
        }

        /* 右側：天氣資訊 */
        .weather-list {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .weather-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .weather-row:last-child {
            border-bottom: none;
        }

        .weather-label {
            font-size: 18px;
            font-weight: 500;
        }

        .weather-value-group {
            display: flex;
            align-items: baseline;
        }

        .weather-value {
            font-size: 34px;
            font-weight: bold;
        }

        .weather-unit {
            font-size: 14px;
            margin-left: 5px;
            color: var(--light-text);
        }

        /* 底部 Footer */
        .footer {
            background-color: var(--footer-bg);
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            border-top: 2px solid var(--border-color);
        }

        .footer-section {
            display: flex;
            width: 48%;
            justify-content: space-between;
        }

        .loading {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            color: var(--light-text);
        }
    </style>
</head>
<body>

    <div class="device-frame">
        <div class="content">
            <div class="panel" id="bus-panel">
                <div class="loading">載入九巴資訊中...</div>
            </div>

            <div class="panel-divider"></div>

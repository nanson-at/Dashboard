<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九巴與活動日曆看板</title>
    <style>
        /* 模擬電子墨水屏 (E-ink) 的基本設定 */
        :root {
            --bg-color: #e8e8e8;
            --panel-bg: #f4f4f4;
            --text-color: #2b2b2b;
            --light-text: #555;
            --border-color: #b0b0b0;
            --badge-bg: #cccccc;
            --footer-bg: #d0d0d0;
        }

        body {
            margin: 0;
            padding: 20px;
            background-image: url('images/dark_wood_texture.png');
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang HK", "Microsoft JhengHei", sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 主機殼邊框設計 */
        .device-frame {
            background-color: var(--panel-bg);
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
            width: 900px;
            height: 540px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 頂部雙線裝飾 */
        .device-frame::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid var(--border-color);
            pointer-events: none;
            z-index: 10;
        }

        /* 內容區塊 */
        .content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        /* 左右面板共用設定 */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel-divider {
            width: 2px;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 4px,
                var(--border-color) 4px,
                var(--border-color) 8px
            );
        }

        /* 左側：巴士資訊 */
        .bus-list {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .bus-row {
            display: flex;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .bus-route-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90px;
            margin-right: 15px;
        }

        .bus-route {
            background-color: var(--badge-bg);
            padding: 3px 0;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }

        .bus-dest {
            font-size: 11px;
            font-weight: bold;
            color: var(--light-text);
            margin-top: 3px;
            text-align: center;
            white-space: nowrap;
        }

        .bus-etas {
            display: flex;
            flex: 1;
            justify-content: space-between;
        }

        .eta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
        }

        .eta-time {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .eta-remark {
            font-size: 11px;
            color: var(--light-text);
            margin-top: 1px;
        }

        /* 右側：活動日曆 */
        .events-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
        }
        .events-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .event-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border-color);
        }
        .event-date {
            min-width: 72px;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.2;
        }
        .event-date .wd {
            display: block;
            font-size: 11px;
            color: var(--light-text);
            font-weight: normal;
        }
        .event-body { flex: 1; }
        .event-title {
            font-size: 16px;
            font-weight: 600;
        }
        .event-meta {
            font-size: 12px;
            color: var(--light-text);
            margin-top: 2px;
        }
        .event-today {
            background: rgba(0,0,0,0.04);
            margin: 0 -6px;
            padding-left: 6px;
            padding-right: 6px;
            border-radius: 4px;
        }
        .event-past .event-title {
            color: var(--light-text);
            text-decoration: line-through;
        }

        /* 底部 Footer */
        .footer {
            background-color: var(--footer-bg);
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            border-top: 2px solid var(--border-color);
        }

        .footer-section {
            display: flex;
            width: 48%;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .footer-weather {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .loading {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            color: var(--light-text);
        }
    </style>
</head>
<body>

    <div class="device-frame">
        <div class="content">
            <!-- 左側：九巴資訊 -->
            <div class="panel" id="bus-panel">
                <div class="loading">載入九巴資訊中...</div>
            </div>

            <!-- 中間分隔線 -->
            <div class="panel-divider"></div>

            <!-- 右側：活動日曆 -->
            <div class="panel" id="events-panel">
                <div class="loading">載入活動日曆中...</div>
            </div>
        </div>

        <!-- 底部狀態列 -->
        <div class="footer">
            <div class="footer-section">
                <span>巴士與小巴到站時間</span>
                <span class="clock">00:00</span>
            </div>
            <div class="footer-section">
                <span class="footer-weather" id="footer-weather">天氣載入中...</span>
                <span class="clock">00:00</span>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 設定區
        // ==========================================
        // 巴士與小巴路線及站點配置 (錦上路 205E / 石湖塘 / 威裕花園 附近站點)
        const BUS_CONFIGS = [
            {
                type: 'KMB',
                route: '251A',
                url: 'https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/7AA3F7F89AD36B1B', // 石湖塘 YL659
                filterRoute: '251A',
                dest: '上村'
            },
            {
                type: 'KMB',
                route: '64K',
                url: 'https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/7AA3F7F89AD36B1B', // 石湖塘 YL659
                filterRoute: '64K',
                dest: '大埔墟站'
            },
            {
                type: 'KMB',
                route: '64K',
                url: 'https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/3D29F886079F85E9', // 石湖塘 YL694
                filterRoute: '64K',
                dest: '元朗(西)'
            },
            {
                type: 'GMB',
                route: '71',
                url: 'https://data.etagmb.gov.hk/eta/route-stop/2008290/20016485', // 石田路, 近威裕花園
                filterRouteSeq: 1, // 往河背
                dest: '河背'
            },
            {
                type: 'GMB',
                route: '71',
                url: 'https://data.etagmb.gov.hk/eta/route-stop/2008290/20016474', // 石田路, 近威裕花園
                filterRouteSeq: 2, // 往元朗
                dest: '元朗'
            },
            {
                type: 'GMB',
                route: '71A',
                url: 'https://data.etagmb.gov.hk/eta/route-stop/2008388/20016485', // 石田路, 近威裕花園
                filterRouteSeq: 2, // 往長莆
                dest: '長莆'
            },
            {
                type: 'GMB',
                route: '71A',
                url: 'https://data.etagmb.gov.hk/eta/route-stop/2008388/20016474', // 石田路, 近威裕花園
                filterRouteSeq: 1, // 往錦上路站
                dest: '錦上路站'
            }
        ];

        // ==========================================
        // 時鐘更新邏輯
        // ==========================================
        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const timeString = `${hh}:${mm}`;
            document.querySelectorAll('.clock').forEach(el => el.textContent = timeString);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==========================================
        // 巴士與小巴 API 邏輯
        // ==========================================
        async function fetchBusData() {
            try {
                const promises = BUS_CONFIGS.map(async (config) => {
                    try {
                        const response = await fetch(config.url);
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        const json = await response.json();
                        if (!json) return null;

                        let etas = [];
                        if (config.type === 'KMB') {
                            if (json.data && json.data.length > 0) {
                                // Filter KMB ETAs for the specific route
                                const routeData = json.data.filter(item => item.route === config.filterRoute);
                                etas = routeData.map(item => {
                                    return {
                                        time: item.eta,
                                        remark: item.rmk_tc || '實時預測'
                                    };
                                }).filter(item => item.time); // filter out empty times
                                
                                // Sort by time
                                etas.sort((a, b) => new Date(a.time) - new Date(b.time));
                            }
                        } else if (config.type === 'GMB') {
                            if (json.data && json.data.length > 0) {
                                const routeStop = json.data.find(item => item.route_seq === config.filterRouteSeq);
                                if (routeStop && routeStop.eta && routeStop.eta.length > 0) {
                                    etas = routeStop.eta.map(item => {
                                        return {
                                            time: item.timestamp,
                                            remark: '實時預測'
                                        };
                                    });
                                }
                            }
                        }

                        return {
                            route: config.route,
                            dest: config.dest,
                            type: config.type,
                            etas: etas
                        };
                    } catch (error) {
                        console.error(`Error fetching ${config.route} (${config.dest}):`, error);
                        return {
                            route: config.route,
                            dest: config.dest,
                            type: config.type,
                            etas: [],
                            error: true
                        };
                    }
                });

                const settledResults = await Promise.allSettled(promises);
                const results = settledResults
                    .filter(r => r.status === 'fulfilled' && r.value)
                    .map(r => r.value);

                renderBusPanel(results);
            } catch (error) {
                console.error('Bus API Error:', error);
                const panel = document.getElementById('bus-panel');
                panel.replaceChildren();
                const errDiv = document.createElement('div');
                errDiv.className = 'loading';
                errDiv.textContent = '無法連接巴士資訊';
                panel.appendChild(errDiv);
            }
        }

        function renderBusPanel(results) {
            const panel = document.getElementById('bus-panel');
            panel.replaceChildren(); // Safe way to clear

            if (results.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'loading';
                emptyDiv.textContent = '暫無巴士班次資料';
                panel.appendChild(emptyDiv);
                return;
            }

            const busListDiv = document.createElement('div');
            busListDiv.className = 'bus-list';

            results.forEach(item => {
                const busRowDiv = document.createElement('div');
                busRowDiv.className = 'bus-row';

                const routeContainer = document.createElement('div');
                routeContainer.className = 'bus-route-container';

                const routeDiv = document.createElement('div');
                routeDiv.className = 'bus-route';
                routeDiv.textContent = item.route;

                const destDiv = document.createElement('div');
                destDiv.className = 'bus-dest';
                destDiv.textContent = `往 ${item.dest}`;

                routeContainer.appendChild(routeDiv);
                routeContainer.appendChild(destDiv);
                busRowDiv.appendChild(routeContainer);

                const etasDiv = document.createElement('div');
                etasDiv.className = 'bus-etas';

                // Display up to 3 ETAs, padded with empty items if less than 3
                for (let i = 0; i < 3; i++) {
                    const etaItemDiv = document.createElement('div');
                    etaItemDiv.className = 'eta-item';

                    const etaTimeDiv = document.createElement('div');
                    etaTimeDiv.className = 'eta-time';

                    const etaRemarkDiv = document.createElement('div');
                    etaRemarkDiv.className = 'eta-remark';

                    const eta = item.etas[i];
                    if (eta && eta.time) {
                        const etaDate = new Date(eta.time);
                        const hh = String(etaDate.getHours()).padStart(2, '0');
                        const mm = String(etaDate.getMinutes()).padStart(2, '0');
                        etaTimeDiv.textContent = `${hh}:${mm}`;

                        let displayRemark = '實時預測';
                        if (eta.remark && eta.remark.includes('原定')) {
                            displayRemark = '原定班次';
                        }
                        etaRemarkDiv.textContent = displayRemark;
                    } else {
                        etaTimeDiv.textContent = '--:--';
                        etaTimeDiv.style.color = 'transparent';
                        etaRemarkDiv.textContent = '';
                    }

                    etaItemDiv.appendChild(etaTimeDiv);
                    etaItemDiv.appendChild(etaRemarkDiv);
                    etasDiv.appendChild(etaItemDiv);
                }

                busRowDiv.appendChild(etasDiv);
                busListDiv.appendChild(busRowDiv);
            });

            panel.appendChild(busListDiv);
        }

        // ==========================================
        // 活動日曆（讀取 data/events.json）
        // ==========================================
        const EVENTS_URL = 'data/events.json';
        const WEEKDAYS = ['日','一','二','三','四','五','六'];

        async function fetchEventsData() {
            try {
                const response = await fetch(EVENTS_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                renderEventsPanel(data.events || []);
            } catch (error) {
                console.error('Events API Error:', error);
                const panel = document.getElementById('events-panel');
                panel.replaceChildren();
                const errDiv = document.createElement('div');
                errDiv.className = 'loading';
                errDiv.textContent = '無法載入活動日曆';
                panel.appendChild(errDiv);
            }
        }

        function renderEventsPanel(events) {
            const panel = document.getElementById('events-panel');
            panel.replaceChildren();

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const todayStr = now.toISOString().slice(0, 10);

            const monthEvents = events
                .filter(e => {
                    const d = new Date(e.date + 'T00:00:00');
                    return d.getFullYear() === year && d.getMonth() === month;
                })
                .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

            const header = document.createElement('div');
            header.className = 'events-header';
            header.textContent = year + '年' + (month + 1) + '月活動';
            panel.appendChild(header);

            if (monthEvents.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'loading';
                empty.textContent = '本月暫無活動';
                panel.appendChild(empty);
                return;
            }

            const list = document.createElement('div');
            list.className = 'events-list';

            monthEvents.forEach(e => {
                const d = new Date(e.date + 'T00:00:00');
                const row = document.createElement('div');
                row.className = 'event-row';
                if (e.date === todayStr) row.classList.add('event-today');
                if (e.date < todayStr) row.classList.add('event-past');

                const dateDiv = document.createElement('div');
                dateDiv.className = 'event-date';
                dateDiv.innerHTML = e.date.slice(5) + '<span class="wd">星期' + WEEKDAYS[d.getDay()] + '</span>';

                const body = document.createElement('div');
                body.className = 'event-body';
                const title = document.createElement('div');
                title.className = 'event-title';
                title.textContent = e.title;
                const meta = document.createElement('div');
                meta.className = 'event-meta';
                meta.textContent = (e.time || '--:--') + ' · ' + (e.person || '');
                body.appendChild(title);
                body.appendChild(meta);

                row.appendChild(dateDiv);
                row.appendChild(body);
                list.appendChild(row);
            });

            panel.appendChild(list);
        }

        // ==========================================
        // 初始化與定時更新
        // ==========================================
        // ==========================================
        // 右下角天氣（香港天文台）
        // ==========================================
        async function fetchWeatherFooter() {
            try {
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();

                const temp = data.temperature && data.temperature.data && data.temperature.data[0]
                    ? data.temperature.data[0].value : '--';
                const place = data.temperature && data.temperature.data && data.temperature.data[0]
                    ? data.temperature.data[0].place : '';
                const humidity = data.humidity && data.humidity.data && data.humidity.data[0]
                    ? data.humidity.data[0].value : '--';
                const uv = data.uvindex && data.uvindex.data && data.uvindex.data[0]
                    ? data.uvindex.data[0].value : '--';
                const rain = data.rainfall && data.rainfall.data && data.rainfall.data[0]
                    ? data.rainfall.data[0].max : '--';
                let warn = '';
                if (data.warningMessage && data.warningMessage.length > 0) {
                    warn = ' · 警告生效';
                }

                const el = document.getElementById('footer-weather');
                if (el) {
                    el.textContent = `天氣 ${temp}°C (${place}) · 濕度 ${humidity}% · UV ${uv} · 雨量 ${rain}mm${warn}`;
                }
            } catch (error) {
                console.error('Weather footer error:', error);
                const el = document.getElementById('footer-weather');
                if (el) el.textContent = '天氣暫時無法載入';
            }
        }

        fetchBusData();
        fetchEventsData();
        fetchWeatherFooter();
        setInterval(fetchBusData, 10000);
        setInterval(fetchEventsData, 60000);
        setInterval(fetchWeatherFooter, 60000);


    </script>
</body>
</html>
